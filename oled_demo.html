<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NVSCL_ OLED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbit&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    color: #fff;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior: none;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    font-family: "Inter", -apple-system, "SF Pro Text", BlinkMacSystemFont, "Hiragino Sans", system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding:
      env(safe-area-inset-top)
      env(safe-area-inset-right)
      env(safe-area-inset-bottom)
      env(safe-area-inset-left);
  }

  /* ==================== Stage layout ==================== */
  /* Figma reference (landscape canvas ~852x393):
       OLED 320x160 (~38% w), buttons 120x120, numbers 45px Orbit, brand 24px Inter.
     Sizes below are tuned so the layout matches those proportions on iPhone in portrait
     (after the rotate(90deg) media query swaps vmin/vmax). */
  .stage {
    --gap: clamp(18px, 5vmin, 56px);
    --oled-w: clamp(200px, 42vmin, 380px);
    display: grid;
    grid-template-columns: auto var(--oled-w) auto;
    grid-template-rows: auto auto auto;
    column-gap: var(--gap);
    row-gap: clamp(10px, 2.5vmin, 22px);
    align-items: center;
    justify-items: center;
  }

  .brand {
    grid-column: 2;
    grid-row: 1;
    font-family: "Inter", sans-serif;
    font-weight: 400;
    font-size: clamp(13px, 3vmin, 24px);
    letter-spacing: clamp(0.3em, 0.6vmin, 0.5em);
    padding-left: 0.5em;
    color: #fff;
    white-space: nowrap;
  }
  .brand .cursor {
    display: inline-block;
    margin-left: 2px;
    animation: blink-cursor 1.1s steps(1) infinite;
  }
  @keyframes blink-cursor { 50% { opacity: 0; } }

  /* ==================== Buttons ==================== */
  .btn-pad {
    width: clamp(78px, 16vmin, 120px);
    aspect-ratio: 1 / 1;
    background: #222;
    border: 0.5px solid rgba(255, 255, 255, 0.2);
    border-radius: 2px;
    color: #fff;
    font-family: "Inter", "Helvetica Neue", "DIN Alternate", sans-serif;
    font-size: clamp(12px, 2.2vmin, 20px);
    font-weight: 700;
    letter-spacing: 0.1em;
    line-height: 1.4;
    text-transform: uppercase;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.25em;
    cursor: pointer;
    transition: background 0.15s, transform 0.08s, box-shadow 0.15s;
  }
  .btn-pad:hover  { background: #2a2a2a; }
  .btn-pad:active { background: #181818; transform: scale(0.97); }
  .btn-pad.is-on  { background: #2f2f2f; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.45); }
  .btn-pad.is-busy { opacity: 0.6; }

  .btn-l { grid-column: 1; grid-row: 2; }
  .btn-r { grid-column: 3; grid-row: 2; }

  /* ==================== OLED panel ==================== */
  .oled {
    grid-column: 2;
    grid-row: 2;
    width: 100%;
    aspect-ratio: 128 / 64;
    border: 1.25px solid rgba(255, 255, 255, 0.2);
    background: #000;
    position: relative;
  }
  canvas#oled {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* ==================== Numbers (time + weight) below OLED ==================== */
  /* Figma uses 45px Orbit on a 320px-wide OLED ≈ 14% ratio.
     We scale the same ratio against the new (smaller) OLED width via clamp+vmin. */
  .numbers {
    grid-column: 2;
    grid-row: 3;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0 clamp(2px, 0.8vmin, 8px);
    margin-top: clamp(4px, 1vmin, 10px);
    font-family: "Orbit", "SF Mono", monospace;
    font-size: clamp(32px, 10vmin, 56px);
    letter-spacing: 0.05em;
    color: #fff;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .numbers .time   { text-align: left;  min-width: 5ch; }
  .numbers .weight { text-align: right; min-width: 3ch; }
  .numbers.is-disconnected .time,
  .numbers.is-disconnected .weight { color: #444; }

  /* Status text (small, just under brand) */
  .status {
    grid-column: 2;
    grid-row: 1;
    align-self: end;
    font-family: "SF Mono", "Menlo", monospace;
    font-size: clamp(9px, 1.5vmin, 11px);
    letter-spacing: 0.2em;
    color: #777;
    margin-top: 4px;
    text-transform: uppercase;
    pointer-events: none;
  }

  @media (orientation: portrait) {
    .stage {
      transform: rotate(90deg);
      transform-origin: center center;
      --gap: clamp(18px, 5vmax, 56px);
      --oled-w: clamp(200px, 42vmax, 380px);
    }
    .brand {
      font-size: clamp(13px, 3vmax, 24px);
      letter-spacing: clamp(0.3em, 0.6vmax, 0.5em);
    }
    .numbers {
      font-size: clamp(32px, 10vmax, 56px);
    }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="brand" id="brand" aria-label="NVSCL"><span class="cursor">_</span></div>

    <button class="btn-pad btn-l" id="btnTare" aria-label="ON/OFF / TARE">
      <span>ON/OFF</span>
      <span>TARE</span>
    </button>

    <div class="oled" aria-hidden="true">
      <canvas id="oled" width="128" height="64"></canvas>
    </div>

    <button class="btn-pad btn-r" id="btnStart" aria-label="START / STOP">
      <span>START</span>
      <span>STOP</span>
    </button>

    <div class="numbers is-disconnected" id="numbers">
      <div class="time"   id="time">00.00</div>
      <div class="weight" id="weight">0</div>
    </div>
  </div>

<script>
  // ==================== BLE constants (KT630B / MY_SCALE) ====================
  const SERVICE_UUID = "0000ffb0-0000-1000-8000-00805f9b34fb";
  const NOTIFY_UUID  = "0000ffb2-0000-1000-8000-00805f9b34fb";
  const TARGET_NAME  = "MY_SCALE";

  // ==================== OLED chart constants ====================
  const OLED_W = 128;
  const OLED_H = 64;
  const BAR_W = 1;
  const BAR_STRIDE = 3;                              // px between bar starts
  const MAX_BARS = Math.floor(OLED_W / BAR_STRIDE);  // ~42 bars visible
  const SAMPLE_INTERVAL_MS = 1000;                   // 1 discrete sample / sec
  const Y_FLOOR_G = 50;                              // min full-scale (g)
  const TOP_PADDING_PX = 4;
  const FILL = '#d9d9d9';

  // ==================== State ====================
  let bleDevice = null;
  let notifyChar = null;
  let connected = false;

  let lastRawWeightG = 0;
  let lastStable = false;
  let tareOffsetG = 0;

  let recording = false;
  let recordStartMs = 0;
  let lastSampleSec = -1;
  /** @type {Array<{t:number, w:number}>} */
  const samples = [];

  // ==================== DOM ====================
  const canvas = document.getElementById('oled');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const timeEl    = document.getElementById('time');
  const weightEl  = document.getElementById('weight');
  const numbersEl = document.getElementById('numbers');
  const btnStart  = document.getElementById('btnStart');
  const btnTare   = document.getElementById('btnTare');

  // ==================== Drawing ====================
  function clear() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, OLED_W, OLED_H);
  }

  function drawBars() {
    if (samples.length === 0) return;
    const visible = samples.length > MAX_BARS
      ? samples.slice(samples.length - MAX_BARS)
      : samples;
    let maxW = Y_FLOOR_G;
    for (const s of visible) if (s.w > maxW) maxW = s.w;
    const usableH = OLED_H - TOP_PADDING_PX;

    ctx.fillStyle = FILL;
    for (let i = 0; i < visible.length; i++) {
      const w = Math.max(0, visible[i].w);
      const h = Math.round((w / maxW) * usableH);
      if (h <= 0) continue;
      const x = i * BAR_STRIDE;
      ctx.fillRect(x, OLED_H - h, BAR_W, h);
    }
  }

  function drawIdleHint() {
    // Single dim pixel-row baseline so the panel does not look dead.
    ctx.fillStyle = '#1f1f1f';
    ctx.fillRect(0, OLED_H - 1, OLED_W, 1);
  }

  function render() {
    clear();
    if (samples.length === 0) drawIdleHint();
    else drawBars();
  }

  // ==================== Numbers ====================
  function fmtTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return String(m).padStart(2, '0') + '.' + String(s).padStart(2, '0');
  }

  function displayedWeight() {
    return lastRawWeightG - tareOffsetG;
  }

  function updateNumbers() {
    let tSec = 0;
    if (recording) {
      tSec = (Date.now() - recordStartMs) / 1000;
    } else if (samples.length > 0) {
      tSec = samples[samples.length - 1].t;
    }
    timeEl.textContent = fmtTime(tSec);

    const w = displayedWeight();
    const rounded = Math.round(w);
    weightEl.textContent = (rounded === 0 ? '0' : (rounded > 0 ? String(rounded) : '−' + Math.abs(rounded)));
  }

  // ==================== BLE ====================
  // Packet: 20B  AC 40 SS 00 W1 W2 W3 00..00 A6 CC
  function parsePacket(buf) {
    if (buf.byteLength !== 20) return null;
    const v = new DataView(buf);
    if (v.getUint8(0) !== 0xAC) return null;
    const stable = v.getUint8(2) === 0x01;
    const raw = (v.getUint8(4) << 16) | (v.getUint8(5) << 8) | v.getUint8(6);
    return { weightG: raw / 1000, stable };
  }

  function onNotify(e) {
    const parsed = parsePacket(e.target.value.buffer);
    if (!parsed) return;
    lastRawWeightG = parsed.weightG;
    lastStable = parsed.stable;
    updateNumbers();
  }

  async function connect() {
    if (!navigator.bluetooth) {
      alert('Web Bluetooth に対応していません (Bluefy / Chrome / Edge を使用してください)');
      return;
    }
    btnTare.classList.add('is-busy');
    try {
      const device = await navigator.bluetooth.requestDevice({
        filters: [{ name: TARGET_NAME }],
        optionalServices: [SERVICE_UUID],
      });
      device.addEventListener('gattserverdisconnected', onDisconnected);
      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      const ch = await service.getCharacteristic(NOTIFY_UUID);
      await ch.startNotifications();
      ch.addEventListener('characteristicvaluechanged', onNotify);

      bleDevice = device;
      notifyChar = ch;
      connected = true;
      btnTare.classList.add('is-on');
      numbersEl.classList.remove('is-disconnected');
    } catch (e) {
      console.error(e);
    } finally {
      btnTare.classList.remove('is-busy');
    }
  }

  function disconnect() {
    if (recording) stopRecording();
    try {
      if (notifyChar) notifyChar.removeEventListener('characteristicvaluechanged', onNotify);
      if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
    } catch (e) { console.error(e); }
    onDisconnected();
  }

  function onDisconnected() {
    bleDevice = null;
    notifyChar = null;
    connected = false;
    lastRawWeightG = 0;
    lastStable = false;
    btnTare.classList.remove('is-on');
    numbersEl.classList.add('is-disconnected');
    updateNumbers();
  }

  // ==================== Tare ====================
  function tare() {
    tareOffsetG = lastRawWeightG;
    updateNumbers();
  }

  // ==================== Recording ====================
  function startRecording() {
    if (!connected) return;
    samples.length = 0;
    recordStartMs = Date.now();
    lastSampleSec = -1;
    recording = true;
    btnStart.classList.add('is-on');
  }

  function stopRecording() {
    recording = false;
    btnStart.classList.remove('is-on');
  }

  function sampleTick() {
    if (!recording) return;
    const tSec = (Date.now() - recordStartMs) / 1000;
    const slot = Math.floor(tSec);
    if (slot !== lastSampleSec) {
      lastSampleSec = slot;
      samples.push({ t: slot, w: displayedWeight() });
      render();
    }
    updateNumbers();
  }
  setInterval(sampleTick, 100);  // check 10x/s, but only commit a sample once per second

  // ==================== Buttons ====================
  // Left button: tap = connect (when off) or tare (when on). Long-press = disconnect.
  let pressTimer = null;
  let longPressed = false;
  const LONG_PRESS_MS = 600;

  function onTarePressStart(ev) {
    ev.preventDefault();
    longPressed = false;
    if (!connected) return;
    pressTimer = setTimeout(() => {
      longPressed = true;
      disconnect();
    }, LONG_PRESS_MS);
  }

  function onTarePressEnd(ev) {
    ev.preventDefault();
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    if (longPressed) return;
    if (!connected) connect();
    else tare();
  }

  function onTarePressCancel() {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  }

  btnTare.addEventListener('pointerdown', onTarePressStart);
  btnTare.addEventListener('pointerup',   onTarePressEnd);
  btnTare.addEventListener('pointerleave', onTarePressCancel);
  btnTare.addEventListener('pointercancel', onTarePressCancel);

  // Right button: toggle recording.
  btnStart.addEventListener('click', () => {
    if (!connected) return;
    if (recording) stopRecording();
    else startRecording();
  });

  // ==================== Init ====================
  render();
  updateNumbers();

  // ==================== Logo typing animation ====================
  (function () {
    const brand = document.getElementById("brand");
    if (!brand) return;

    const FULL  = "NERVOUS.SCALE";
    const FINAL = "NVSCL";
    const TYPE_MS  = 100;
    const ERASE_MS = 60;
    const HOLD_FULL  = 700;
    const HOLD_EMPTY = 250;
    const START_DELAY = 200;

    const steps = [];
    for (let i = 1; i <= FULL.length; i++) steps.push({ t: FULL.slice(0, i), w: TYPE_MS });
    steps[steps.length - 1].w = HOLD_FULL;
    for (let i = FULL.length - 1; i >= 1; i--) steps.push({ t: FULL.slice(0, i), w: ERASE_MS });
    steps[steps.length - 1].w = HOLD_EMPTY;
    for (let i = 2; i <= FINAL.length; i++) steps.push({ t: FINAL.slice(0, i), w: TYPE_MS });

    function paint(text) {
      brand.textContent = text.split("").join(" ");
    }

    let i = 0;
    function tick() {
      if (i >= steps.length) {
        brand.innerHTML = FINAL.split("").join(" ") + '<span class="cursor">_</span>';
        return;
      }
      const s = steps[i++];
      paint(s.t);
      setTimeout(tick, s.w);
    }
    paint("");
    setTimeout(tick, START_DELAY);
  })();
</script>
</body>
</html>
