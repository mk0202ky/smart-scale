<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NVSCL_ OLED Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbit&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    color: #fff;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior: none;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    font-family: "Inter", -apple-system, "SF Pro Text", BlinkMacSystemFont, "Hiragino Sans", system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding:
      env(safe-area-inset-top)
      env(safe-area-inset-right)
      env(safe-area-inset-bottom)
      env(safe-area-inset-left);
  }

  /* ==================== Stage layout ==================== */
  .stage {
    --gap: clamp(14px, 3.5vmin, 36px);
    --oled-w: clamp(260px, 58vmin, 540px);
    display: grid;
    grid-template-columns: auto var(--oled-w) auto;
    grid-template-rows: auto auto auto;
    column-gap: var(--gap);
    row-gap: clamp(10px, 2.5vmin, 22px);
    align-items: center;
    justify-items: center;
  }

  .brand {
    grid-column: 2;
    grid-row: 1;
    font-family: "Inter", sans-serif;
    font-weight: 400;
    font-size: clamp(13px, 2.5vmin, 20px);
    letter-spacing: 0.5em;
    padding-left: 0.5em; /* compensate trailing letter-spacing */
    color: #fff;
  }

  /* ==================== Buttons ==================== */
  .btn-pad {
    width: clamp(78px, 16vmin, 120px);
    aspect-ratio: 1 / 1;
    background: #222;
    border: 0.5px solid rgba(255, 255, 255, 0.2);
    border-radius: 2px;
    color: #fff;
    font-family: "Inter", "Helvetica Neue", "DIN Alternate", sans-serif;
    font-size: clamp(12px, 2.2vmin, 20px);
    font-weight: 700;
    letter-spacing: 0.1em;
    line-height: 1.4;
    text-transform: uppercase;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.25em;
    cursor: pointer;
    transition: background 0.15s, transform 0.08s;
  }
  .btn-pad:hover  { background: #2a2a2a; }
  .btn-pad:active { background: #181818; transform: scale(0.97); }
  .btn-pad.is-on  { background: #2f2f2f; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25); }

  .btn-l { grid-column: 1; grid-row: 2; }
  .btn-r { grid-column: 3; grid-row: 2; }

  /* ==================== OLED panel ==================== */
  .oled {
    grid-column: 2;
    grid-row: 2;
    width: 100%;
    aspect-ratio: 128 / 64;
    border: 1.25px solid rgba(255, 255, 255, 0.2);
    background: #000;
    position: relative;
  }
  canvas#oled {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* ==================== Numbers (time + weight) below OLED ==================== */
  .numbers {
    grid-column: 2;
    grid-row: 3;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0 clamp(4px, 1.5vmin, 18px);
    font-family: "Orbit", "SF Mono", monospace;
    font-size: clamp(24px, 7vmin, 45px);
    letter-spacing: 0.05em;
    color: #fff;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .numbers .time   { text-align: left;  min-width: 5ch; }
  .numbers .weight { text-align: right; min-width: 3ch; }

  /* When iPhone is portrait: rotate the whole stage 90° to mimic the Figma vertical mount.
     ON/OFF TARE ends up at the top, START/STOP at the bottom. */
  @media (orientation: portrait) {
    .stage {
      transform: rotate(90deg);
      transform-origin: center center;
      --oled-w: clamp(260px, 58vmax, 540px);
    }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="brand">N V S C L _</div>

    <button class="btn-pad btn-l" id="btnTare" aria-label="ON/OFF / TARE">
      <span>ON/OFF</span>
      <span>TARE</span>
    </button>

    <div class="oled" aria-hidden="true">
      <canvas id="oled" width="128" height="64"></canvas>
    </div>

    <button class="btn-pad btn-r" id="btnStart" aria-label="START / STOP">
      <span>START</span>
      <span>STOP</span>
    </button>

    <div class="numbers">
      <div class="time"   id="time">00.00</div>
      <div class="weight" id="weight">0</div>
    </div>
  </div>

<script>
  // ==================== OLED bar data (from Figma 5:1655, native 128x64 px) ====================
  // Top tick markers: short dashes left → progressively longer lines → long bar right.
  const TOP_MARKS = [
    { x: 1,  w: 2  },
    { x: 5,  w: 2  },
    { x: 9,  w: 2  },
    { x: 13, w: 2  },
    { x: 17, w: 2  },
    { x: 23, w: 10 },
    { x: 42, w: 26 },
    { x: 83, w: 45 },
  ];

  // Cumulative-weight bars. Each entry = bar height in OLED pixels (1px wide, 3px stride from x=0).
  // X axis: 2 seconds per bar. Y axis: total weight [g], scaled so the tallest bar maps to FINAL_WEIGHT_G.
  const BAR_HEIGHTS = [
    6, 13, 22, 30, 30, 30, 30, 30, 30, 30, 30, 30,
    34, 36, 39, 41, 43, 44, 46, 46, 47, 48, 49, 50,
    51, 53, 55, 56, 57, 59, 59, 61, 61, 61, 61, 61,
    61, 61, 61, 61, 61, 61, 61
  ];
  const BAR_W = 1;
  const BAR_STRIDE = 3;
  const BAR_X0 = 0;

  // Demo timing & scale
  const SEC_PER_BAR = 2;
  const TOTAL_BARS = BAR_HEIGHTS.length;                // 43
  const TOTAL_SEC = TOTAL_BARS * SEC_PER_BAR;           // 86s = 01:26
  const FINAL_WEIGHT_G = 287;
  const MAX_BAR_PX = Math.max(...BAR_HEIGHTS);          // 61
  const ANIM_DURATION_MS = 8000;                        // 8s compressed playback

  // ==================== Canvas setup ====================
  const canvas = document.getElementById('oled');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  function clear() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 128, 64);
  }

  function drawTopMarks(progress) {
    if (progress <= 0) return;
    ctx.fillStyle = '#d9d9d9';
    // Marks fade in across the first 25% of timeline.
    const visible = Math.min(1, progress / 0.25);
    const cutoff = Math.floor(TOP_MARKS.length * visible);
    for (let i = 0; i < cutoff; i++) {
      const m = TOP_MARKS[i];
      ctx.fillRect(m.x, 0, m.w, 1);
    }
  }

  function drawBars(progress) {
    if (progress <= 0) return;
    ctx.fillStyle = '#d9d9d9';
    const filled = progress * TOTAL_BARS;
    for (let i = 0; i < TOTAL_BARS; i++) {
      const reveal = Math.max(0, Math.min(1, filled - i));
      if (reveal <= 0) continue;
      const h = Math.round(BAR_HEIGHTS[i] * reveal);
      if (h <= 0) continue;
      const x = BAR_X0 + i * BAR_STRIDE;
      ctx.fillRect(x, 64 - h, BAR_W, h);
    }
  }

  function render(progress) {
    clear();
    drawTopMarks(progress);
    drawBars(progress);
  }

  // ==================== Readout ====================
  const timeEl   = document.getElementById('time');
  const weightEl = document.getElementById('weight');

  function fmtTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return String(m).padStart(2, '0') + '.' + String(s).padStart(2, '0');
  }

  function currentBarHeightAt(progress) {
    // Interpolate between adjacent bar heights at the continuous bar index.
    const idxF = progress * TOTAL_BARS;
    if (idxF <= 0) return 0;
    if (idxF >= TOTAL_BARS) return BAR_HEIGHTS[TOTAL_BARS - 1];
    const i = Math.floor(idxF);
    const frac = idxF - i;
    const h0 = i === 0 ? 0 : BAR_HEIGHTS[i - 1];
    const h1 = BAR_HEIGHTS[i];
    return h0 + (h1 - h0) * frac;
  }

  function updateReadout(progress) {
    const sec = progress * TOTAL_SEC;
    const h = currentBarHeightAt(progress);
    const weight = (h / MAX_BAR_PX) * FINAL_WEIGHT_G;
    timeEl.textContent = fmtTime(sec);
    weightEl.textContent = String(Math.round(weight));
  }

  // ==================== State machine + animation loop ====================
  // 'idle' (progress=0)  →  START → 'running'  →  STOP → 'paused'  →  START → 'running'
  // 'running' reaches end → 'finished'  →  START → restart from 0
  // TARE at any time → 'idle' (progress reset)
  let phase = 'idle';
  let progress = 0;
  let lastTs = null;
  let rafId = null;

  function tick(ts) {
    if (phase !== 'running') { lastTs = null; rafId = null; return; }
    if (lastTs === null) lastTs = ts;
    const dt = ts - lastTs;
    lastTs = ts;

    progress += dt / ANIM_DURATION_MS;
    if (progress >= 1) {
      progress = 1;
      phase = 'finished';
      btnStart.classList.remove('is-on');
    }
    render(progress);
    updateReadout(progress);

    if (phase === 'running') {
      rafId = requestAnimationFrame(tick);
    } else {
      rafId = null;
    }
  }

  function play() {
    if (phase === 'finished') progress = 0;
    phase = 'running';
    lastTs = null;
    btnStart.classList.add('is-on');
    if (rafId === null) rafId = requestAnimationFrame(tick);
  }

  function pause() {
    phase = 'paused';
    btnStart.classList.remove('is-on');
  }

  function tare() {
    phase = 'idle';
    progress = 0;
    btnStart.classList.remove('is-on');
    render(0);
    updateReadout(0);
  }

  // ==================== Button wiring ====================
  const btnStart = document.getElementById('btnStart');
  const btnTare  = document.getElementById('btnTare');

  btnStart.addEventListener('click', () => {
    if (phase === 'running') pause();
    else                     play();
  });

  btnTare.addEventListener('click', tare);

  // Initial paint
  render(0);
  updateReadout(0);
</script>
</body>
</html>
